  友链: /link/ || fas fa-link
  关于: /about/ || fas fa-heart

# 社交图标
social:
  fab fa-github: https://github.com/ZYH1207 || Github || '#24292e'
  fas fa-envelope: mailto:2385377554@qq.com || Email || '#24292e'

