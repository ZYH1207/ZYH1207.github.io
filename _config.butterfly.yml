# 导航栏
nav:
  logo:
  display_title: true
  fixed: false

# Inject
# Insert the code to head (before '</head>' tag) and the bottom (before '</body>' tag)
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
  bottom:
    - <script src="/js/footer.js"></script>
    
# 菜单导航
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  友链: /link/ || fas fa-link
  关于: /about/ || fas fa-heart

# 社交图标
social:
  fab fa-github: https://github.com/ZYH1207 || Github || '#24292e'
  fas fa-envelope: mailto:2385377554@qq.com || Email || '#24292e'

# 网站图标
favicon: /img/favicon.ico

# 头像
avatar:
  img: /img/avatar.png
  effect: false

# 页面头图
index_img: /img/background.jpg
default_top_img: /img/background.jpg
archive_img: /img/background.jpg
tag_img: /img/background.jpg
category_img: /img/background.jpg

# 文章封面
cover:
  index_enable: true
  aside_enable: false
  archives_enable: false
  position: left
  default_cover:
    - /img/background.jpg

# 404页面
error_404:
  enable: true
  subtitle: '页面没有找到'
  background: https://i.loli.net/2020/05/19/aKOcLiyPl2JQdFD.png

# 页脚设置
footer:
  owner:
    enable: false # 必须关闭，否则会多出一行默认版权
  custom_text: |
    <div id="footer-custom-content" style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
      <div id="copyright_info" style="color: #ffffff; font-size: 0.95rem;"></div>

      <div id="runtime_info" style="color: #ffffff; font-size: 0.85rem;">
        <span id="runtime_span">加载中...</span>
      </div>

      <div id="footer_badges" style="margin-top: 5px;">
        <a style="margin-inline:5px" target="_blank" href="https://github.com/ZYH1207"><img src="https://img.shields.io/badge/Github-ZYH1207-24292e?logo=github" title="我的Github"></a>
        <a style="margin-inline:5px" target="_blank" href="mailto:2385377554@qq.com"><img src="https://img.shields.io/badge/Email-联系我-49B1F5?logo=gmail" title="发送邮件"></a>
        <a style="margin-inline:5px" target="_blank" href="https://hexo.io/"><img src="https://img.shields.io/badge/Hexo-博客-0E88EB?logo=hexo" title="Hexo框架"></a>
        <a style="margin-inline:5px" target="_blank" href="https://butterfly.js.org/"><img src="https://img.shields.io/badge/Theme-Butterfly-FF7242?logo=blogger" title="Butterfly主题"></a>
      </div>
    </div>
  copyright: true

# 本地搜索
local_search:
  enable: true
  preload: true
  top_n_per_article: 1
  unescape: false
  CDN:

# 博客配色
theme_color:
  enable: true
  main: "#49B1F5"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#99a9bf"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#00c4b6"
  blockquote_padding_color: "#49b1f5"
  blockquote_background_color: "#49b1f5"
  scrollbar_color: "#49b1f5"
  meta_theme_color_light: "#ffffff"
  meta_theme_color_dark: "#0d0d0d"

# 博客背景
background: "#fbfdff"

# 博客字体
font:
  global-font-size: 15px
  code-font-size:
  font-family: 'Noto Sans SC'
  code-font-family:

# CDN
CDN:
  internal_provider: local
  third_party_provider: unpkg

# Code Blocks 代码块
code_blocks:
  theme: pale night   # 主题：darker / pale night / light / ocean / false
  macStyle: true      # Mac 窗口风格（顶部三个圆点）
  height_limit: 800   # 代码块最大高度（px）
  word_wrap: true     # 自动换行
  copy: true          # 复制按钮
  language: true      # 显示语言名称
  shrink: false       # 是否默认收缩代码块
  fullpage: false     # 全屏按钮
  
  
# 首页副标题
subtitle:
  enable: true
  effect: true
  typed_option:
  source: false
  sub:
    - 你当像鸟飞往你的山
    - 青山不改，绿水长流
    - Perfect in your own way
    - Keep the Blue Flag Flying High
