# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Bird的个人博客
subtitle: '记录生活与成长'
description: "切尔西忠实拥趸💙<br>小区级业余门将⚽️<br>还没入门的码农💻<br>笔名：鸟子🐦"
keywords:
author: Cole
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: https://ZYH1207.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true

# 关闭 Hexo 自带高亮 → 必须关！
syntax_highlighter: false

# highlight:
#   line_number: true
#   auto_detect: false
#   tab_replace: ''
#   wrap: true
#   hljs: false

# prismjs:
#   preprocess: true
#   line_number: true
#   tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

include:
exclude:
ignore:

# Extensions
theme: butterfly

# Deployment
deploy:
  type: git
  repo: git@github.com:ZYH1207/ZYH1207.github.io.git
  branch: gh-pages
  message: "Site updated: {{ now('YYYY-MM-DD HH:mm:ss') }}"

# RSS 订阅配置
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  content: false